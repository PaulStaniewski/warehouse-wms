services:
  backend:
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_DEBUG: "True"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app

  frontend:
    command: npm run dev
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_USE_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
